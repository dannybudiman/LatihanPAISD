<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belajar PAI — Kelas 1 SD Islam 🕌</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#00b4d8; --teal-dark:#0077b6;
  --gold:#f4a500; --gold-light:#ffd166;
  --green:#06d6a0; --purple:#7b2d8b; --pink:#ef476f; --sky:#e0f4ff; --text:#1a1a2e;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin:0; font-family:'Nunito', sans-serif; background:#f0f9ff; color:var(--text);
  line-height: 1.6;
}

/* HEADER */
.main-header {
  background: linear-gradient(135deg, var(--teal), var(--teal-dark));
  color:#fff; padding:20px; text-align:center; 
  border-bottom:5px solid rgba(0,0,0,0.1);
}

/* NAVBAR - MEMASTIKAN BISA DIKLIK */
.nav-container {
  display:flex; overflow-x:auto; padding:15px; gap:12px; background:#fff;
  position:sticky; top:0; z-index:999; /* Sangat tinggi agar tidak tertutup */
  border-bottom:1px solid #ddd;
  -webkit-overflow-scrolling: touch;
}
.nav-item {
  flex:0 0 auto; padding:10px 18px; border-radius:20px; background:#f0f0f0;
  font-weight:700; cursor:pointer; border:2px solid transparent;
  user-select: none;
}
.nav-item.active { background:var(--gold); color:#fff; border-color:var(--gold-light); }

/* CONTENT SECTION */
.world-section { display:none; padding:20px; max-width: 600px; margin: 0 auto; }
.world-section.active { display:block; }

/* TAB MENU */
.tab-container {
  display:flex; background:#e0f4ff; border-radius:15px; padding:5px; margin-bottom:20px;
  position: relative; z-index: 10;
}
.tab-btn {
  flex:1; padding:12px; text-align:center; border-radius:12px; cursor:pointer;
  font-weight:800; color:var(--teal-dark); transition:0.3s;
  user-select: none;
}
.tab-btn.active { background:#fff; box-shadow:0 4px 8px rgba(0,0,0,0.1); color:var(--gold); }

.tab-content { display:none; }
.tab-content.active { display:block; }

/* FLASHCARD */
.fc-card {
  background:#fff; border-radius:25px; padding:30px; text-align:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.05); border:6px solid var(--sky);
  margin-bottom:20px;
}
.fc-img-box {
  width:120px; height:120px; margin:0 auto 15px;
  background:#f9f9f9; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size: 40px;
}
.fc-text { font-size:24px; font-weight:800; color:var(--purple); }
.fc-sub { font-size:18px; color:#666; margin-top: 10px; }

.fc-nav { display:flex; justify-content:space-between; align-items:center; gap: 10px; }
.fc-btn {
  flex: 1; background:var(--teal); color:#fff; padding:12px; border-radius:15px;
  font-weight:700; cursor:pointer; border:none; box-shadow:0 4px 0 var(--teal-dark);
}
.fc-btn:active { transform:translateY(2px); box-shadow:none; }

/* TEBAK KATA / MATCHING */
.wm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.match-item {
  background: #fff; padding: 12px; border-radius: 12px; text-align: center;
  font-weight: 700; cursor: pointer; border: 2px solid var(--sky);
}
.match-item.selected { background: var(--gold-light); border-color: var(--gold); }
.match-item.matched { background: var(--green); color: white; border-color: transparent; cursor: default; }

/* TUGAS */
.task-item {
  display:flex; align-items:center; padding:12px; background:#fff; 
  margin-bottom:10px; border-radius:12px; gap:10px;
}
.check-btn {
  width:25px; height:25px; border-radius:6px; border:2px solid var(--teal);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.check-btn.done { background:var(--green); border-color:var(--green); color:white; }
</style>
</head>
<body>

<header class="main-header">
  <h1>🕌 Belajar PAI</h1>
  <p>Kelas 1 SD — Semester 2</p>
</header>

<nav class="nav-container" id="nav-bar">
  <div class="nav-item" onclick="changeBab(3)">Bab 3</div>
  <div class="nav-item" onclick="changeBab(4)">Bab 4</div>
  <div class="nav-item active" onclick="changeBab(5)">Bab 5</div>
  <div class="nav-item" onclick="changeBab(6)">Bab 6</div>
  <div class="nav-item" onclick="changeBab(7)">Bab 7</div>
  <div class="nav-item" onclick="changeBab(8)">Bab 8</div>
  <div class="nav-item" onclick="changeBab(9)">Bab 9</div>
</nav>

<div id="content-area">
  </div>

<script>
// DATA SEMUA BAB
const allData = {
  3: { title: "Iman Kepada Allah", flash: [{t:"Rukun Iman", s:"Ada 6"}, {t:"Iman", s:"Artinya Percaya"}], tasks: ["Berdoa sebelum belajar", "Menyebutkan rukun iman"], match: [{w:"Iman", c:"Percaya"}]},
  4: { title: "Bersuci", flash: [{t:"Wudhu", s:"Pakai Air Bersih"}, {t:"Istinja", s:"Setelah Buang Air"}], tasks: ["Mempraktekkan Wudhu"], match: [{w:"Wudhu", c:"Air"}]},
  5: { title: "Kisah Para Nabi", flash: [{t:"Nabi Adam", s:"Nabi Pertama"}, {t:"Nabi Nuh", s:"Membuat Kapal"}], tasks: ["Mendengar kisah Nabi", "Mewarnai Kapal"], match: [{w:"Nuh", c:"Kapal"}, {w:"Adam", c:"Tanah"}]},
  6: { title: "Al-Qur'an", flash: [{t:"Al-Fatihah", s:"Pembukaan"}, {t:"Al-Ikhlas", s:"Keesaan Allah"}], tasks: ["Hafal Al-Fatihah"], match: [{w:"Al-Quran", c:"Kitab Allah"}]},
  7: { title: "Adab & Akhlak", flash: [{t:"Sopan", s:"Kepada Guru"}, {t:"Sayang", s:"Kepada Teman"}], tasks: ["Membantu orang tua"], match: [{w:"Adab", c:"Perilaku"}]},
  8: { title: "Gemar Membaca", flash: [{t:"Iqra", s:"Bacalah"}, {t:"Ilmu", s:"Cahaya Hati"}], tasks: ["Membaca 1 halaman"], match: [{w:"Buku", c:"Jendela Ilmu"}]},
  9: { title: "Bersyukur", flash: [{t:"Alhamdulillah", s:"Ucap Syukur"}, {t:"Nikmat", s:"Pemberian Allah"}], tasks: ["Mengucap syukur"], match: [{w:"Syukur", c:"Terima Kasih"}]}
};

let currentBab = 5;
let currentTab = 'fc';
let flashIdx = 0;
let matchedItems = {};
let selectedWord = null;

// FUNGSI UTAMA PINDAH BAB
function changeBab(n) {
  currentBab = n;
  flashIdx = 0;
  matchedItems = {};
  selectedWord = null;
  
  // Update UI Navigasi
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.innerText.includes('Bab ' + n));
  });

  renderWorld();
}

// RENDER TAMPILAN
function renderWorld() {
  const area = document.getElementById('content-area');
  const data = allData[currentBab];

  area.innerHTML = `
    <section class="world-section active">
      <h2 style="text-align:center">Bab ${currentBab}: ${data.title}</h2>
      
      <div class="tab-container">
        <div class="tab-btn ${currentTab==='fc'?'active':''}" onclick="setTab('fc')">Flashcard</div>
        <div class="tab-btn ${currentTab==='tg'?'active':''}" onclick="setTab('tg')">Tugas</div>
        <div class="tab-btn ${currentTab==='wm'?'active':''}" onclick="setTab('wm')">Tebak</div>
      </div>

      <div id="tab-content-render">
        ${renderCurrentTab()}
      </div>
    </section>
  `;
}

function setTab(t) {
  currentTab = t;
  renderWorld();
}

function renderCurrentTab() {
  const data = allData[currentBab];

  if(currentTab === 'fc') {
    const card = data.flash[flashIdx] || data.flash[0];
    return `
      <div class="fc-card">
        <div class="fc-img-box">📖</div>
        <div class="fc-text">${card.t}</div>
        <div class="fc-sub">${card.s}</div>
      </div>
      <div class="fc-nav">
        <button class="fc-btn" onclick="moveFC(-1)">⬅️</button>
        <div style="font-weight:bold">${flashIdx+1} / ${data.flash.length}</div>
        <button class="fc-btn" onclick="moveFC(1)">➡️</button>
      </div>
    `;
  }

  if(currentTab === 'tg') {
    return data.tasks.map(t => `
      <div class="task-item">
        <div class="check-btn" onclick="this.classList.toggle('done'); this.innerHTML=this.classList.contains('done')?'✔':''"></div>
        <span>${t}</span>
      </div>
    `).join('');
  }

  if(currentTab === 'wm') {
    return `
      <div class="wm-grid">
        <div class="wm-col">
          ${data.match.map(m => `<div class="match-item ${selectedWord===m.w?'selected':''} ${matchedItems[m.w]?'matched':''}" onclick="selW('${m.w}')">${m.w}</div>`).join('')}
        </div>
        <div class="wm-col">
          ${data.match.map(m => `<div class="match-item ${Object.values(matchedItems).includes(m.c)?'matched':''}" onclick="checkM('${m.c}')">${m.c}</div>`).join('')}
        </div>
      </div>
    `;
  }
}

// LOGIKA FLASHCARD
function moveFC(dir) {
  const max = allData[currentBab].flash.length;
  flashIdx += dir;
  if(flashIdx < 0) flashIdx = 0;
  if(flashIdx >= max) flashIdx = max - 1;
  renderWorld();
}

// LOGIKA TEBAK KATA
function selW(w) { 
  if(matchedItems[w]) return;
  selectedWord = w; 
  renderWorld(); 
}
function checkM(c) {
  if(!selectedWord) return;
  const item = allData[currentBab].match.find(i => i.w === selectedWord);
  if(item && item.c === c) {
    matchedItems[selectedWord] = c;
    selectedWord = null;
    renderWorld();
    if(Object.keys(matchedItems).length === allData[currentBab].match.length) {
      alert("Hebat! Kamu Berhasil!");
    }
  } else {
    selectedWord = null;
    renderWorld();
  }
}

// Jalankan saat pertama buka
window.onload = renderWorld;

</script>
</body>
</html>
