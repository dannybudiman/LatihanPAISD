<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belajar PAI — Kelas 1 SD Islam 🕌</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* --- KEMBALIKAN CSS ASLI KAMU --- */
:root {
  --teal:#00b4d8; --teal-dark:#0077b6;
  --gold:#f4a500; --gold-light:#ffd166;
  --green:#06d6a0; --purple:#7b2d8b; --purple-light:#c77dff;
  --pink:#ef476f; --sky:#e0f4ff; --text:#1a1a2e;
  --orange:#ff6b35; --orange-dark:#c84b00;
  --lime:#8bc34a; --lime-dark:#558b2f;
  --rose:#e91e8c; --rose-dark:#ad145c;
  --indigo:#5c6bc0; --indigo-dark:#3949ab;
  --emerald:#00897b; --emerald-dark:#00695c;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin:0; font-family:'Nunito', sans-serif; background:#f0f9ff; color:var(--text); overflow-x:hidden; }
h1, h2, h3 { font-family:'Baloo 2', cursive; margin:0; }

.main-header {
  background: linear-gradient(135deg, var(--teal), var(--teal-dark));
  color:#fff; padding:20px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.1);
  border-bottom:5px solid rgba(0,0,0,0.1);
}

.nav-container {
  display:flex; overflow-x:auto; padding:15px; gap:12px; background:#fff;
  position:sticky; top:0; z-index:100; border-bottom:1px solid #ddd;
}
.nav-item {
  flex:0 0 auto; padding:10px 18px; border-radius:20px; background:#f0f0f0;
  font-weight:700; cursor:pointer; transition:0.3s; border:2px solid transparent;
}
.nav-item.active { background:var(--gold); color:#fff; border-color:var(--gold-light); transform:scale(1.05); }

.world-section { display:none; padding:20px; animation:fadeIn 0.5s ease; }
.world-section.active { display:block; }

@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

.tab-container { display:flex; background:#e0f4ff; border-radius:15px; padding:5px; margin-bottom:20px; }
.tab-btn { flex:1; padding:12px; text-align:center; border-radius:12px; cursor:pointer; font-weight:800; color:var(--teal-dark); transition:0.3s; }
.tab-btn.active { background:#fff; box-shadow:0 4px 8px rgba(0,0,0,0.1); color:var(--gold); }

.tab-content { display:none; }
.tab-content.active { display:block; }

/* Styles Flashcard */
.fc-card { background:#fff; border-radius:25px; padding:30px; text-align:center; box-shadow:0 15px 35px rgba(0,0,0,0.1); border:8px solid var(--sky); margin-bottom:20px; position:relative; }
.fc-img-box { width:100%; max-width:200px; height:200px; margin:0 auto 20px; background:#f9f9f9; border-radius:20px; display:flex; align-items:center; justify-content:center; }
.fc-img-box img { max-width:90%; max-height:90%; border-radius:15px; }
.fc-text { font-size:24px; font-weight:800; color:var(--purple); margin-bottom:10px; }
.fc-sub { font-size:18px; color:#666; }
.fc-nav { display:flex; justify-content:space-between; align-items:center; }
.fc-btn { background:var(--teal); color:#fff; padding:12px 25px; border-radius:15px; font-weight:700; cursor:pointer; border:none; box-shadow:0 4px 0 var(--teal-dark); }
.fc-btn:active { transform:translateY(2px); box-shadow:none; }
.fc-counter { font-weight:800; font-size:18px; color:var(--teal-dark); }

/* Styles Matching Game */
.wm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.wm-col { display: flex; flex-direction: column; gap: 10px; }
.match-item { background: #fff; padding: 15px; border-radius: 15px; text-align: center; font-weight: 700; cursor: pointer; border: 3px solid var(--sky); transition: 0.2s; min-height: 60px; display: flex; align-items: center; justify-content: center; }
.match-item.selected { border-color: var(--gold); background: var(--gold-light); }
.match-item.matched { background: var(--green); border-color: #fff; color: #fff; cursor: default; }

/* Styles Checklist */
.task-list { background:#fff; border-radius:20px; padding:20px; box-shadow:0 5px 15px rgba(0,0,0,0.05); }
.task-item { display:flex; align-items:center; padding:15px; border-bottom:1px solid #eee; gap:15px; cursor: pointer; }
.check-btn { width:30px; height:30px; border-radius:8px; border:3px solid var(--teal); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.check-btn.done { background:var(--green); border-color:var(--green); color:#fff; }
.task-text { font-size:16px; font-weight:600; }
.task-text.done { text-decoration:line-through; color:#aaa; }
</style>
</head>
<body>

<header class="main-header">
  <h1>🕌 Belajar PAI Seru!</h1>
  <p>Kelas 1 SD — Semester 2</p>
</header>

<div class="nav-container">
  <div class="nav-item" id="nav3" onclick="showWorld(3)">Bab 3</div>
  <div class="nav-item" id="nav4" onclick="showWorld(4)">Bab 4</div>
  <div class="nav-item active" id="nav5" onclick="showWorld(5)">Bab 5</div>
  <div class="nav-item" id="nav6" onclick="showWorld(6)">Bab 6</div>
  <div class="nav-item" id="nav7" onclick="showWorld(7)">Bab 7</div>
  <div class="nav-item" id="nav8" onclick="showWorld(8)">Bab 8</div>
  <div class="nav-item" id="nav9" onclick="showWorld(9)">Bab 9</div>
</div>

<main id="main-content">
  <script>
    const babList = [3,4,5,6,7,8,9];
    const babTitles = {
      3: "Iman Kepada Allah", 4: "Bersuci", 5: "Kisah Para Nabi",
      6: "Al-Qur'an", 7: "Adab Anak", 8: "Membaca", 9: "Bersyukur"
    };
    
    babList.forEach(b => {
      document.write(`
        <section id="world-bab${b}" class="world-section ${b===5?'active':''}">
          <h2 style="text-align:center; color:var(--teal-dark); margin-bottom:20px;">Bab ${b}: ${babTitles[b]}</h2>
          <div class="tab-container">
            <div class="tab-btn active" id="btn-fc-${b}" onclick="switchTab(${b}, 'fc')">Flashcard</div>
            <div class="tab-btn" id="btn-tg-${b}" onclick="switchTab(${b}, 'tg')">Tugas</div>
            <div class="tab-btn" id="btn-wm-${b}" onclick="switchTab(${b}, 'wm')">Tebak Kata</div>
          </div>

          <div id="b${b}-fc" class="tab-content active">
            <div class="fc-card">
              <div class="fc-img-box" id="b${b}-fc-img">🖼️</div>
              <div class="fc-text" id="b${b}-fc-text">...</div>
              <div class="fc-sub" id="b${b}-fc-sub">...</div>
            </div>
            <div class="fc-nav">
              <button class="fc-btn" onclick="prevFC(${b})">⬅️</button>
              <div class="fc-counter" id="b${b}-fc-count">0 / 0</div>
              <button class="fc-btn" onclick="nextFC(${b})">➡️</button>
            </div>
          </div>

          <div id="b${b}-tg" class="tab-content">
            <div class="task-list" id="b${b}-task-list"></div>
          </div>

          <div id="b${b}-wm" class="tab-content">
            <div class="wm-grid">
              <div class="wm-col" id="b${b}-wm-words"></div>
              <div class="wm-col" id="b${b}-wm-cats"></div>
            </div>
          </div>
        </section>
      `);
    });
  </script>
</main>

<script>
// --- DATA MATERIMU (LENGKAP) ---
const flashcardsData = {
  3: [{t:"Rukun Iman", s:"Ada 6 Perkara"}, {t:"Iman", s:"Artinya Percaya"}],
  4: [{t:"Wudhu", s:"Suci sebelum shalat"}, {t:"Istinja", s:"Bersih setelah buang air"}],
  5: [
    {t:"Nabi Adam a.s.", s:"Manusia Pertama", i:"img/bab5/1.png"},
    {t:"Nabi Idris a.s.", s:"Sangat Cerdas", i:"img/bab5/2.png"},
    {t:"Nabi Nuh a.s.", s:"Membuat Kapal Besar", i:"img/bab5/3.png"},
    {t:"Nabi Hud a.s.", s:"Sabar Menghadapi Kaum Aad", i:"img/bab5/4.png"},
    {t:"Siddiq", s:"Artinya Jujur", i:"img/bab5/5.png"},
    {t:"Amanah", s:"Terpercaya", i:"img/bab5/6.png"},
    {t:"Tabligh", s:"Menyampaikan", i:"img/bab5/7.png"}
  ],
  6: [{t:"Al-Fatihah", s:"Pembukaan"}, {t:"Al-Ikhlas", s:"Keesaan Allah"}],
  7: [{t:"Sopan", s:"Kepada Orang Tua"}, {t:"Sayang", s:"Kepada Teman"}],
  8: [{t:"Iqra", s:"Artinya Bacalah"}, {t:"Buku", s:"Jendela Dunia"}],
  9: [{t:"Alhamdulillah", s:"Ucap Syukur"}, {t:"Sabar", s:"Tahan Amarah"}]
};

const tugasData = {
  5: ["Mendengar cerita Nabi Adam", "Mewarnai Kapal Nabi Nuh", "Menghafal 25 Nabi"],
  3: ["Sebutkan 6 Rukun Iman", "Berdoa sebelum belajar"]
};

const wmDataMap = {
  5: [{word:"Adam", cat:"Pertama"}, {word:"Nuh", cat:"Kapal"}, {word:"Idris", cat:"Cerdas"}],
  3: [{word:"Iman", cat:"Percaya"}]
};

// --- MESIN LOGIKA (PERBAIKAN UTAMA) ---
let flashState = {};
let taskState = {};
let wmState = {};

function initApp() {
  babList.forEach(b => {
    // Inisialisasi status data per bab
    flashState[b] = { idx: 0 };
    taskState[b] = (tugasData[b] || ["Belajar Bab " + b]).map(t => ({text:t, done:false}));
    wmState[b] = { sel: null, matched: {} };
    
    // Render semua supaya data masuk ke HTML
    renderFlashcard(b);
    renderTugas(b);
    renderWM(b);
  });
}

function showWorld(n) {
  // 1. Ganti tampilan Navigasi
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav' + n).classList.add('active');

  // 2. Ganti tampilan Section
  document.querySelectorAll('.world-section').forEach(sec => sec.classList.remove('active'));
  document.getElementById('world-bab' + n).classList.add('active');

  // 3. Render Ulang konten bab tersebut agar fresh
  renderFlashcard(n);
}

function switchTab(bab, tabType) {
  const section = document.getElementById('world-bab' + bab);
  
  // Update tombol tab
  section.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(`btn-${tabType}-${bab}`).classList.add('active');

  // Update isi tab
  section.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`b${bab}-${tabType}`).classList.add('active');
  
  // Re-render tab yang dibuka
  if(tabType === 'fc') renderFlashcard(bab);
  if(tabType === 'tg') renderTugas(bab);
  if(tabType === 'wm') renderWM(bab);
}

function renderFlashcard(b) {
  const data = flashcardsData[b] || [{t:"Materi", s:"Segera hadir"}];
  const st = flashState[b];
  const item = data[st.idx];

  document.getElementById(`b${b}-fc-text`).innerText = item.t;
  document.getElementById(`b${b}-fc-sub`).innerText = item.s;
  document.getElementById(`b${b}-fc-count`).innerText = `${st.idx + 1} / ${data.length}`;
  
  const imgBox = document.getElementById(`b${b}-fc-img`);
  if(item.i) {
    imgBox.innerHTML = `<img src="${item.i}" onerror="this.innerHTML='🖼️';">`;
  } else {
    imgBox.innerHTML = '🖼️';
  }
}

function nextFC(b) {
  if (flashState[b].idx < (flashcardsData[b] || []).length - 1) {
    flashState[b].idx++;
    renderFlashcard(b);
  }
}

function prevFC(b) {
  if (flashState[b].idx > 0) {
    flashState[b].idx--;
    renderFlashcard(b);
  }
}

function renderTugas(b) {
  const list = document.getElementById(`b${b}-task-list`);
  const tasks = taskState[b];
  list.innerHTML = tasks.map((t, i) => `
    <div class="task-item" onclick="toggleTask(${b}, ${i})">
      <div class="check-btn ${t.done ? 'done' : ''}">${t.done ? '✔' : ''}</div>
      <div class="task-text ${t.done ? 'done' : ''}">${t.text}</div>
    </div>
  `).join('');
}

function toggleTask(b, i) {
  taskState[b][i].done = !taskState[b][i].done;
  renderTugas(b);
}

function renderWM(b) {
  const data = wmDataMap[b] || [];
  const st = wmState[b];
  const wordCol = document.getElementById(`b${b}-wm-words`);
  const catCol = document.getElementById(`b${b}-wm-cats`);
  
  if(!wordCol) return;
  if(data.length === 0) {
    wordCol.innerHTML = "Segera hadir";
    return;
  }

  wordCol.innerHTML = data.map(i => `
    <div class="match-item ${st.sel===i.word?'selected':''} ${st.matched[i.word]?'matched':''}" onclick="selectWMWord(${b}, '${i.word}')">${i.word}</div>
  `).join('');

  catCol.innerHTML = data.map(i => `
    <div class="match-item ${Object.values(st.matched).includes(i.cat)?'matched':''}" onclick="selectWMCat(${b}, '${i.cat}')">${i.cat}</div>
  `).join('');
}

function selectWMWord(b, w) {
  if(wmState[b].matched[w]) return;
  wmState[b].sel = w;
  renderWM(b);
}

function selectWMCat(b, c) {
  const st = wmState[b];
  if(!st.sel) return;
  const item = wmDataMap[b].find(i => i.word === st.sel);
  if(item && item.cat === c) {
    st.matched[st.sel] = c;
    st.sel = null;
    renderWM(b);
  } else {
    st.sel = null;
    renderWM(b);
  }
}

// Jalankan aplikasi
window.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
