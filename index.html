<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belajar PAI — Kelas 1 SD Islam 🕌</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* --- KEMBALI KE DESAIN ASLI ANDA --- */
:root {
  --teal:#00b4d8; --teal-dark:#0077b6;
  --gold:#f4a500; --gold-light:#ffd166;
  --green:#06d6a0; --purple:#7b2d8b; --purple-light:#c77dff;
  --pink:#ef476f; --sky:#e0f4ff; --text:#1a1a2e;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin:0; font-family:'Nunito', sans-serif; background:#f0f9ff; color:var(--text); padding-bottom: 80px;
}
h1, h2, h3 { font-family:'Baloo 2', cursive; margin:0; }

.main-header {
  background: linear-gradient(135deg, var(--teal), var(--teal-dark));
  color:#fff; padding:20px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.1);
  border-bottom:5px solid rgba(0,0,0,0.1);
}

/* Navigasi Bab (Sticky di Atas) */
.nav-container {
  display:flex; overflow-x:auto; padding:15px; gap:12px; background:#fff;
  position:sticky; top:0; z-index:1000; border-bottom:1px solid #ddd;
}
.nav-item {
  flex:0 0 auto; padding:10px 18px; border-radius:20px; background:#f0f0f0;
  font-weight:700; cursor:pointer; transition:0.3s; border:2px solid transparent;
}
.nav-item.active { background:var(--gold); color:#fff; border-color:var(--gold-light); transform:scale(1.05); }

/* Konten Dunia */
.world-section { display:none; padding:20px; animation:fadeIn 0.5s ease; max-width: 600px; margin: 0 auto; }
.world-section.active { display:block; }

@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* Tab Menu di dalam Bab */
.tab-container {
  display:flex; background:#e0f4ff; border-radius:15px; padding:5px; margin-bottom:20px;
  position: relative; z-index: 10;
}
.tab-btn {
  flex:1; padding:12px; text-align:center; border-radius:12px; cursor:pointer;
  font-weight:800; color:var(--teal-dark); transition:0.3s;
}
.tab-btn.active { background:#fff; box-shadow:0 4px 8px rgba(0,0,0,0.1); color:var(--gold); }

.tab-content { display:none; }
.tab-content.active { display:block; }

/* Flashcard */
.fc-card {
  background:#fff; border-radius:25px; padding:30px; text-align:center;
  box-shadow:0 15px 35px rgba(0,0,0,0.1); border:8px solid var(--sky);
  margin-bottom:20px; min-height: 250px; display: flex; flex-direction: column; justify-content: center;
}
.fc-text { font-size:26px; font-weight:800; color:var(--purple); line-height: 1.2; }
.fc-sub { font-size:18px; color:#666; margin-top: 15px; }
.fc-nav { display:flex; justify-content:space-between; align-items:center; }
.fc-btn {
  background:var(--teal); color:#fff; padding:12px 25px; border-radius:15px;
  font-weight:700; cursor:pointer; border:none; box-shadow:0 4px 0 var(--teal-dark);
}
.fc-btn:active { transform:translateY(2px); box-shadow:none; }
.fc-counter { font-weight:800; font-size:18px; color:var(--teal-dark); }

/* Checklist/Tugas */
.task-item {
  display:flex; align-items:center; padding:15px; background:#fff; border-radius:15px; 
  margin-bottom:10px; gap:15px; box-shadow:0 4px 6px rgba(0,0,0,0.05);
}
.check-btn {
  width:30px; height:30px; border-radius:8px; border:3px solid var(--teal);
  cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.check-btn.done { background:var(--green); border-color:var(--green); color:white; }
.task-text.done { text-decoration:line-through; color:#aaa; }

/* Matching Game (Tebak Kata) */
.wm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.wm-col { display: flex; flex-direction: column; gap: 10px; }
.match-item {
  background: #fff; padding: 15px; border-radius: 15px; text-align: center;
  font-weight: 700; cursor: pointer; border: 3px solid var(--sky); transition: 0.2s;
  min-height: 60px; display: flex; align-items: center; justify-content: center;
}
.match-item.selected { border-color: var(--gold); background: var(--gold-light); }
.match-item.matched { background: var(--green); border-color: transparent; color: #fff; cursor: default; }
</style>
</head>
<body>

<header class="main-header">
  <h1>🕌 Belajar PAI Seru!</h1>
  <p>Kelas 1 SD — Semester 2</p>
</header>

<div class="nav-container" id="nav-bab">
  </div>

<main id="app-container">
  </main>

<script>
// --- DATA APLIKASI LENGKAP ---
const babs = [3, 4, 5, 6, 7, 8, 9];
const titles = {
  3:"Iman Kepada Allah", 4:"Bersuci", 5:"Kisah Nabi Adam-Hud", 
  6:"Surah Pendek", 7:"Adab Anak Sholeh", 8:"Gemar Membaca", 9:"Bersyukur"
};

const flashcardsData = {
  3: [{t:"Iman", s:"Artinya Percaya"}, {t:"Rukun Iman", s:"Ada 6 Perkara"}],
  4: [{t:"Wudhu", s:"Membersihkan diri sebelum Shalat"}, {t:"Istinja", s:"Membersihkan kotoran"}],
  5: [
    {t:"Nabi Adam a.s.", s:"Manusia Pertama"},
    {t:"Nabi Idris a.s.", s:"Sangat Cerdas"},
    {t:"Nabi Nuh a.s.", s:"Membuat Kapal Besar"},
    {t:"Sifat Siddiq", s:"Artinya Jujur"},
    {t:"Sifat Amanah", s:"Artinya Terpercaya"}
  ],
  6: [{t:"Al-Fatihah", s:"Pembukaan"}, {t:"Al-Ikhlas", s:"Keesaan Allah"}],
  7: [{t:"Sopan", s:"Kepada Orang Tua"}, {t:"Sayang", s:"Kepada Teman"}],
  8: [{t:"Membaca", s:"Jendela Ilmu"}, {t:"Belajar", s:"Wajib bagi muslim"}],
  9: [{t:"Syukur", s:"Ucap Alhamdulillah"}, {t:"Sabar", s:"Tahan Marah"}]
};

const tugasData = {
  5: ["Mendengar cerita Nabi Adam", "Mewarnai Kapal Nabi Nuh", "Menyebutkan 25 Nama Nabi"],
  // Bab lain bisa ditambah di sini
};

const wmData = {
  5: [{w:"Nuh", c:"Kapal"}, {w:"Adam", c:"Tanah"}, {w:"Idris", c:"Cerdas"}],
  3: [{w:"Iman", c:"Percaya"}]
};

// --- LOGIKA MESIN (STATE) ---
let currentBab = 5;
let state = {};

function initApp() {
  const nav = document.getElementById('nav-bab');
  const container = document.getElementById('app-container');

  babs.forEach(b => {
    // 1. Buat Navigasi
    const btn = document.createElement('div');
    btn.className = `nav-item ${b === currentBab ? 'active' : ''}`;
    btn.id = `nav-item-${b}`;
    btn.innerText = `Bab ${b}`;
    btn.onclick = () => showWorld(b);
    nav.appendChild(btn);

    // 2. Siapkan State
    state[b] = {
      fcIdx: 0,
      tasks: (tugasData[b] || ["Belajar Bab " + b]).map(t => ({text:t, done:false})),
      wmMatched: {},
      wmSelected: null,
      activeTab: 'fc'
    };

    // 3. Buat Section Bab
    const section = document.createElement('section');
    section.id = `world-${b}`;
    section.className = `world-section ${b === currentBab ? 'active' : ''}`;
    section.innerHTML = `
      <h2 style="text-align:center; color:var(--teal-dark); margin-bottom:15px;">Bab ${b}: ${titles[b]}</h2>
      
      <div class="tab-container">
        <div class="tab-btn active" id="tab-btn-${b}-fc" onclick="switchTab(${b}, 'fc')">Flashcard</div>
        <div class="tab-btn" id="tab-btn-${b}-tg" onclick="switchTab(${b}, 'tg')">Tugas</div>
        <div class="tab-btn" id="tab-btn-${b}-wm" onclick="switchTab(${b}, 'wm')">Tebak</div>
      </div>

      <div id="content-${b}-fc" class="tab-content active"></div>
      <div id="content-${b}-tg" class="tab-content"></div>
      <div id="content-${b}-wm" class="tab-content"></div>
    `;
    container.appendChild(section);
    
    // Render isi konten
    renderFlashcard(b);
    renderTugas(b);
    renderWM(b);
  });
}

function showWorld(b) {
  currentBab = b;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`nav-item-${b}`).classList.add('active');

  document.querySelectorAll('.world-section').forEach(el => el.classList.remove('active'));
  document.getElementById(`world-${b}`).classList.add('active');
}

function switchTab(b, tab) {
  state[b].activeTab = tab;
  const sec = document.getElementById(`world-${b}`);
  sec.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  sec.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));

  document.getElementById(`tab-btn-${b}-${tab}`).classList.add('active');
  document.getElementById(`content-${b}-${tab}`).classList.add('active');
}

// --- RENDERER ---

function renderFlashcard(b) {
  const data = flashcardsData[b] || [{t:"Materi", s:"Segera Hadir"}];
  const s = state[b];
  const item = data[s.fcIdx];
  const cont = document.getElementById(`content-${b}-fc`);

  cont.innerHTML = `
    <div class="fc-card">
      <div class="fc-text">${item.t}</div>
      <div class="fc-sub">${item.s}</div>
    </div>
    <div class="fc-nav">
      <button class="fc-btn" onclick="moveFC(${b}, -1)">⬅️</button>
      <div class="fc-counter">${s.fcIdx + 1} / ${data.length}</div>
      <button class="fc-btn" onclick="moveFC(${b}, 1)">➡️</button>
    </div>
  `;
}

function moveFC(b, dir) {
  const data = flashcardsData[b] || [];
  let newIdx = state[b].fcIdx + dir;
  if (newIdx >= 0 && newIdx < data.length) {
    state[b].fcIdx = newIdx;
    renderFlashcard(b);
  }
}

function renderTugas(b) {
  const cont = document.getElementById(`content-${b}-tg`);
  cont.innerHTML = state[b].tasks.map((t, i) => `
    <div class="task-item" onclick="toggleTask(${b}, ${i})">
      <div class="check-btn ${t.done ? 'done' : ''}">${t.done ? '✔' : ''}</div>
      <div class="task-text ${t.done ? 'done' : ''}">${t.text}</div>
    </div>
  `).join('');
}

function toggleTask(b, i) {
  state[b].tasks[i].done = !state[b].tasks[i].done;
  renderTugas(b);
}

function renderWM(b) {
  const cont = document.getElementById(`content-${b}-wm`);
  const data = wmData[b] || [];
  const s = state[b];

  if(data.length === 0) {
    cont.innerHTML = "<center>Game belum tersedia untuk bab ini.</center>";
    return;
  }

  cont.innerHTML = `
    <div class="wm-grid">
      <div class="wm-col">
        ${data.map(item => `
          <div class="match-item ${s.wmSelected === item.w ? 'selected' : ''} ${s.wmMatched[item.w] ? 'matched' : ''}" 
               onclick="selectWM(${b}, '${item.w}')">${item.word || item.w}</div>
        `).join('')}
      </div>
      <div class="wm-col">
        ${[...data].sort().map(item => `
          <div class="match-item ${Object.values(s.wmMatched).includes(item.c) ? 'matched' : ''}" 
               onclick="checkWM(${b}, '${item.c}')">${item.cat || item.c}</div>
        `).join('')}
      </div>
    </div>
  `;
}

function selectWM(b, w) {
  if (state[b].wmMatched[w]) return;
  state[b].wmSelected = w;
  renderWM(b);
}

function checkWM(b, c) {
  const s = state[b];
  if (!s.wmSelected) return;
  const item = wmData[b].find(i => i.w === s.wmSelected);
  if (item && item.c === c) {
    s.wmMatched[s.wmSelected] = c;
    s.wmSelected = null;
    renderWM(b);
  } else {
    s.wmSelected = null;
    renderWM(b);
  }
}

// Mulai Aplikasi
window.onload = initApp;

</script>
</body>
</html>
