<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belajar PAI — Kelas 1 SD Islam 🕌</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* CSS Reset & Variabel */
:root {
  --teal:#00b4d8; --teal-dark:#0077b6;
  --gold:#f4a500; --gold-light:#ffd166;
  --green:#06d6a0; --purple:#7b2d8b; --purple-light:#c77dff;
  --pink:#ef476f; --sky:#e0f4ff; --text:#1a1a2e;
  --orange:#ff6b35; --orange-dark:#c84b00;
  --lime:#8bc34a; --lime-dark:#558b2f;
  --rose:#e91e8c; --rose-dark:#ad145c;
  --indigo:#5c6bc0; --indigo-dark:#3949ab;
  --emerald:#00897b; --emerald-dark:#004d40;
}

* { box-sizing: border-box; -webkit-tap-highlight-color:transparent; }
body {
  margin:0; font-family: 'Nunito', sans-serif; background:#f0f9ff; color:var(--text);
  overflow-x:hidden;
}

/* Layout Utama */
header {
  background: linear-gradient(135deg, var(--teal), var(--teal-dark));
  color:#fff; padding:20px; text-align:center;
  border-bottom-left-radius:30px; border-bottom-right-radius:30px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
header h1 { margin:0; font-family:'Baloo 2', cursive; font-size:1.8rem; }

.container { max-width:600px; margin:0 auto; padding:20px; }

/* Menu Bab */
.bab-menu {
  display: flex; gap: 10px; overflow-x: auto; padding: 10px 0;
  scrollbar-width: none; -ms-overflow-style: none;
}
.bab-menu::-webkit-scrollbar { display: none; }

.bab-btn {
  background: #fff; border: 2px solid var(--teal); border-radius: 15px;
  padding: 10px 20px; font-weight: 800; cursor: pointer; white-space: nowrap;
  color: var(--teal); transition: all 0.2s;
}
.bab-btn.active { background: var(--teal); color: #fff; transform: scale(1.05); }

/* Konten Dunia / Bab */
.world-section { display: none; animation: fadeIn 0.4s ease-out; }
.world-section.active { display: block; }

@keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform:0; } }

/* Navigasi Tab (Flashcard, Tugas, Game) */
.tab-nav {
  display: flex; background: #fff; border-radius: 20px; margin: 20px 0;
  padding: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}
.tab-btn {
  flex:1; border:none; background:none; padding:12px; font-weight:700;
  cursor:pointer; border-radius:15px; color:#888; transition:0.3s;
}
.tab-btn.active { background:var(--gold); color:#fff; }

/* Komponen Flashcard */
.card-container {
  perspective: 1000px; height: 350px; margin-bottom: 20px;
}
.flashcard {
  position: relative; width: 100%; height: 100%; text-align: center;
  transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer;
}
.flashcard.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #fff; border-radius: 25px; padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 8px solid #fff;
}
.card-back { transform: rotateY(180deg); background: var(--sky); }
.card-face img { max-width: 80%; max-height: 180px; border-radius: 15px; margin-bottom: 15px; }
.card-face p { font-size: 1.4rem; font-weight: 800; color: var(--teal-dark); margin: 0; }

.nav-controls { display: flex; justify-content: space-between; align-items: center; }
.nav-btn {
  background: var(--teal); border: none; color: #fff; width: 50px; height: 50px;
  border-radius: 50%; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
.counter { font-weight: 800; font-size: 1.1rem; color: #666; }

/* Tebak Kata / Word Match */
.wm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
.match-item {
  background: #fff; padding: 15px; border-radius: 15px; text-align: center;
  font-weight: 700; cursor: pointer; border: 3px solid #eee; transition: 0.2s;
}
.match-item.selected { border-color: var(--purple); background: var(--purple-light); color: #fff; }
.match-item.matched { background: var(--green); color: #fff; border-color: var(--green); cursor: default; }
.match-item.wrong-flash { animation: shake 0.4s; border-color: var(--pink); }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.result-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 100; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; text-align: center; padding: 20px;
}
.result-overlay.show { display: flex; }
.btn-reset {
  background: var(--gold); border: none; padding: 12px 30px; border-radius: 50px;
  color: #fff; font-weight: 800; margin-top: 20px; cursor: pointer;
}
</style>
</head>
<body>

<header>
  <h1>🕌 Belajar PAI & Budi Pekerti</h1>
  <p>Kelas 1 SD Islam</p>
</header>

<div class="container">
  <div class="bab-menu">
    <button class="bab-btn active" onclick="showWorld(5)">Bab 5</button>
    <button class="bab-btn" onclick="showWorld(6)">Bab 6</button>
    <button class="bab-btn" onclick="showWorld(7)">Bab 7</button>
  </div>

  <div id="world5" class="world-section active">
    <div class="tab-nav">
      <button class="tab-btn active" onclick="showTab(5, 'flash')">Flashcard</button>
      <button class="tab-btn" onclick="showTab(5, 'game')">Tebak Kata</button>
    </div>

    <div id="b5-flash" class="tab-content">
      <div class="card-container">
        <div id="card5" class="flashcard" onclick="this.classList.toggle('flipped')">
          <div class="card-face card-front" id="b5-f-front">
            </div>
          <div class="card-face card-back" id="b5-f-back">
            </div>
        </div>
      </div>
      <div class="nav-controls">
        <button class="nav-btn" onclick="prevFlash(5)">←</button>
        <div class="counter" id="b5-counter">1 / 0</div>
        <button class="nav-btn" onclick="nextFlash(5)">→</button>
      </div>
    </div>

    <div id="b5-game" class="tab-content" style="display:none">
      <p style="text-align:center; font-weight:700;">Pasangkan kata dan kategorinya!</p>
      <div class="wm-grid">
        <div id="b5-wm-words" class="wm-col"></div>
        <div id="b5-wm-cats" class="wm-col"></div>
      </div>
      <div id="b5-wm-result" class="result-overlay">
        <h2>Maa syaa Allah! 🎉</h2>
        <p>Kamu hebat dalam memasangkan kata!</p>
        <button class="btn-reset" onclick="resetWM(5)">Main Lagi</button>
      </div>
    </div>
  </div>

  </div>

<script>
// DATA APLIKASI
const flashcardsData = {
  5: [
    { q: "Malaikat", a: "Diciptakan dari Cahaya", img: "https://cdn-icons-png.flaticon.com/512/3306/3306613.png" },
    { q: "Jibril", a: "Menyampaikan Wahyu", img: "https://cdn-icons-png.flaticon.com/512/2663/2663116.png" },
    { q: "Mikail", a: "Membagi Rezeki", img: "https://cdn-icons-png.flaticon.com/512/1511/1511111.png" }
  ],
  6: [
    { q: "Al-Qur'an", a: "Kitab Umat Islam", img: "https://cdn-icons-png.flaticon.com/512/2881/2881005.png" }
  ]
};

const wmDataMap = {
  5: [
    { word: "Jibril", cat: "Wahyu" },
    { word: "Mikail", cat: "Rezeki" },
    { word: "Israfil", cat: "Sangkakala" }
  ]
};

// STATE MANAGEMENT
let flashState = {};
let wmState = {};

// INISIALISASI STATE
[3,4,5,6,7,8,9].forEach(b => {
  flashState[b] = { idx: 0 };
  wmState[b] = { sel: null, matched: {} };
});

// FUNGSI NAVIGASI BAB
function showWorld(n) {
  document.querySelectorAll('.world-section').forEach(w => w.classList.remove('active'));
  document.querySelectorAll('.bab-btn').forEach(b => b.classList.remove('active'));
  
  const target = document.getElementById('world' + n);
  if(target) target.classList.add('active');
  
  // Update tombol menu
  event.currentTarget.classList.add('active');

  // Render konten bab tersebut
  renderFlashcard(n);
  renderWM(n);
}

// FUNGSI NAVIGASI TAB
function showTab(bab, type) {
  const parent = document.getElementById('world' + bab);
  parent.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  
  document.getElementById('b' + bab + '-' + type).style.display = 'block';
  event.currentTarget.classList.add('active');
}

// LOGIKA FLASHCARD
function renderFlashcard(bab) {
  const data = flashcardsData[bab];
  if (!data) return;
  
  const st = flashState[bab];
  const item = data[st.idx];
  
  const front = document.getElementById(`b${bab}-f-front`);
  const back = document.getElementById(`b${bab}-f-back`);
  const counter = document.getElementById(`b${bab}-counter`);

  if(front && back) {
    front.innerHTML = `<img src="${item.img}" alt="img"><p>${item.q}</p><span>(Klik untuk tahu jawabannya)</span>`;
    back.innerHTML = `<h3>Jawaban:</h3><p>${item.a}</p>`;
    counter.innerText = `${st.idx + 1} / ${data.length}`;
  }
}

function nextFlash(bab) {
  const data = flashcardsData[bab];
  flashState[bab].idx = (flashState[bab].idx + 1) % data.length;
  document.getElementById('card' + bab).classList.remove('flipped');
  setTimeout(() => renderFlashcard(bab), 100);
}

function prevFlash(bab) {
  const data = flashcardsData[bab];
  flashState[bab].idx = (flashState[bab].idx - 1 + data.length) % data.length;
  document.getElementById('card' + bab).classList.remove('flipped');
  setTimeout(() => renderFlashcard(bab), 100);
}

// LOGIKA TEBAK KATA (WORD MATCH)
function renderWM(bab) {
  const items = wmDataMap[bab];
  if (!items) return;
  const st = wmState[bab];
  
  const wordDiv = document.getElementById(`b${bab}-wm-words`);
  const catDiv = document.getElementById(`b${bab}-wm-cats`);
  if(!wordDiv || !catDiv) return;

  wordDiv.innerHTML = '';
  catDiv.innerHTML = '';

  // Render Kata
  items.forEach(item => {
    const isMatched = st.matched[item.word];
    const div = document.createElement('div');
    div.className = `match-item ${st.sel === item.word ? 'selected' : ''} ${isMatched ? 'matched' : ''}`;
    div.innerText = item.word;
    if(!isMatched) div.onclick = () => { st.sel = item.word; renderWM(bab); };
    wordDiv.appendChild(div);
  });

  // Render Kategori (Acak sederhana)
  const cats = [...items].map(i => i.cat).sort();
  cats.forEach(cat => {
    const isMatched = Object.values(st.matched).includes(cat);
    const div = document.createElement('div');
    div.className = `match-item ${isMatched ? 'matched' : ''}`;
    div.innerText = cat;
    if(!isMatched) div.onclick = () => checkMatch(bab, cat);
    catDiv.appendChild(div);
  });

  // Cek jika menang
  if(Object.keys(st.matched).length === items.length) {
    document.getElementById(`b${bab}-wm-result`).classList.add('show');
  }
}

function checkMatch(bab, cat) {
  const st = wmState[bab];
  if(!st.sel) return;
  
  const item = wmDataMap[bab].find(i => i.word === st.sel);
  if(item && item.cat === cat) {
    st.matched[st.sel] = cat;
    st.sel = null;
  } else {
    // Efek salah (opsional)
    st.sel = null;
  }
  renderWM(bab);
}

function resetWM(bab) {
  wmState[bab] = { sel: null, matched: {} };
  document.getElementById(`b${bab}-wm-result`).classList.remove('show');
  renderWM(bab);
}

// JALANKAN SAAT START
window.addEventListener('DOMContentLoaded', () => {
  renderFlashcard(5);
  renderWM(5);
});
</script>

</body>
</html>
